<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie JS 3</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #fff; }
        main { display: grid; place-items: center; min-height: 100vh; gap: 16px; }
        canvas { background: #fff; border: 2px solid #333; }
    </style>
</head>
<body>
    <main>
        <h1>Inicjały KS na canvas</h1>
        <canvas id="canvas" width="700" height="300"></canvas>
    </main>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "#007bff");
        gradient.addColorStop(0.5, "#8e44ad");
        gradient.addColorStop(1, "#ff3b30");

        ctx.lineWidth = 14;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = gradient;

        ctx.beginPath();
        ctx.moveTo(120, 60);
        ctx.lineTo(120, 240);
        ctx.moveTo(120, 150);
        ctx.lineTo(240, 60);
        ctx.moveTo(120, 150);
        ctx.lineTo(240, 240);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(460, 70);
        ctx.bezierCurveTo(360, 40, 330, 150, 440, 160);
        ctx.bezierCurveTo(560, 170, 530, 280, 430, 240);
        ctx.stroke();
    </script>
</body>
</html>
